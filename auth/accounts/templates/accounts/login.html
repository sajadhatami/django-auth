<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>login</title>
</head>
<body>
    <h2>login</h2>
    {% if form.errors %}
    <p style="color: red;">password or username is not correct</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">
            login
        </button>
    </form>
</body>
</html>
